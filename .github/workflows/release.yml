name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Checksums
        run: sha256sum go.mod > checksums.txt
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            checksums.txt

